name: Build & Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download yt-dlp (Linux)
        run: |
          mkdir -p bin/linux
          curl -L -o bin/linux/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
          chmod +x bin/linux/yt-dlp

      - name: Build & Publish Linux
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Download yt-dlp (Windows)
        run: |
          New-Item -ItemType Directory -Force -Path bin\win
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin\win\yt-dlp.exe"

      - name: Build & Publish Windows
        run: npm run publish:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish macOS
        run: npm run publish:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform requirements
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Build Android APK
        run: |
          npm run build:mobile
          npx cap sync android
          cd android
          chmod +x ./gradlew
          ./gradlew clean assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: snowify-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  finalize:
    needs: [build-linux, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: snowify-android-apk
          path: release-assets

      - name: Rename APK asset
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mv release-assets/app-debug.apk "release-assets/Snowify-v${VERSION}-android-debug.apk"

      - name: Publish release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release edit "v${VERSION}" \
            --draft=false \
            --prerelease=${{ inputs.prerelease }} \
            --title "Snowify v${VERSION}"

          gh release upload "v${VERSION}" "release-assets/Snowify-v${VERSION}-android-debug.apk" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
